version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: failsafe
      POSTGRES_PASSWORD: failsafe123
      POSTGRES_DB: failsafe_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U failsafe -d failsafe_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://failsafe:failsafe123@db:5432/failsafe_db
      SECRET_KEY: change-this-secret-in-production
      MODEL_PATH: /app/data/model/model.pkl
      FEATURES_PATH: /app/data/model/feature_cols.pkl
      SCALER_PATH: /app/data/processed/scaler.pkl
      ENCODERS_PATH: /app/data/processed/encoders.pkl
      ML_PIPELINE_PATH: /app/ml_pipeline
    volumes:
      - ./data:/app/data
      - ./ml_pipeline:/app/ml_pipeline
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data: